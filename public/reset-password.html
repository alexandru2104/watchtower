<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Watchtower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E1A; --panel: #131A2B; --panel-2: #1B2438; --border: #262F45;
    --text: #E8EAF2; --text-dim: #8B93A7; --accent: #F5A623; --danger: #E5606A; --safe: #3FA796;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 32px; max-width: 380px; width: 100%; margin: 20px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; margin: 0 0 20px; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  input { width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; color: var(--text); font-size: 14px; }
  button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; padding: 11px 20px; background: var(--accent); color: #1A1206; width: 100%; }
  .msg { font-size: 13px; margin-top: 12px; display: none; }
  .msg.error { color: var(--danger); }
  .msg.success { color: var(--safe); }
  a { color: var(--accent); font-size: 14px; }
</style>
</head>
<body>
  <div class="panel">
    <h1>Set a new password</h1>
    <form id="resetForm">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit">Reset password</button>
      <div class="msg" id="msg"></div>
    </form>
    <div id="successLink" style="margin-top:16px; display:none;">
      <a href="/">Back to log in →</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('resetForm');
    const msg = document.getElementById('msg');

    if (!token) {
      msg.textContent = 'Missing or invalid reset link. Request a new one from the login page.';
      msg.className = 'msg error';
      msg.style.display = 'block';
      form.querySelector('button').disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      msg.style.display = 'none';

      try {
        const res = await fetch(`${window.location.origin}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');

        msg.textContent = data.message;
        msg.className = 'msg success';
        msg.style.display = 'block';
        form.style.display = 'none';
        document.getElementById('successLink').style.display = 'block';
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
